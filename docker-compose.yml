services:
  openvpn-yt-dlp:
    image: dperson/openvpn-client
    container_name: openvpn-yt-dlp
    profiles:
      - vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${VPN_OVPN_PATH}:/vpn/credentials.ovpn:ro
      - ./vpn-auth.txt:/vpn/vpn.auth:ro
    ports:
      - "3130:3129/tcp"
    environment:
      - TZ=Europe/Moscow
    security_opt:
      - label=disable
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "8.8.8.8"]
      interval: 30s
      timeout: 10s
      retries: 3

  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    profiles:
      - vpn
    depends_on:
      openvpn-yt-dlp:
        condition: service_healthy
    network_mode: "service:openvpn-yt-dlp"

    environment:
      - UID=${PUID}
      - GID=${PGID}
      - DOWNLOAD_DIR=/downloads
      - STATE_DIR=/config
      - DELETE_FILE_ON_TRASHCAN=false
      - DEFAULT_THEME=dark
      - OUTPUT_TEMPLATE=%(title)s.%(ext)s
      - YTDL_OPTIONS={"writesubtitles":true,"subtitleslangs":["en","es","fr"],"postprocessors":[{"key":"FFmpegEmbedSubtitle","already_have_subtitle":false}],"format":"bestvideo[height<=?1080]+bestaudio/best","http_headers":{"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"}}
    volumes:
      - ${DOWNLOAD_DIR}:/downloads
      - ./metube/config:/config
    restart: unless-stopped
    labels:
     - "com.centurylinklabs.watchtower.enable=true"

  landing-vpn:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: metube-landing-vpn
    profiles:
      - vpn
    ports:
      - "8087:8080/tcp"
    user: "${PUID}:${PGID}"

    environment:
      - METUBE_URL=http://metube:8081
      - PROXY_PORT=8080
      - DASHBOARD_PORT=9090
      - DOWNLOAD_DIR=/downloads
    volumes:
      - ${DOWNLOAD_DIR}:/downloads:rw
    depends_on:
      metube:
        condition: service_started
    restart: unless-stopped

  yt-dlp-cli:
    image: ghcr.io/jim60105/yt-dlp:pot
    container_name: yt-dlp-cli
    profiles:
      - vpn
      - vpn-cli
      - no-vpn
    user: "${PUID}:${PGID}"

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Moscow
    volumes:
      - ./yt-dlp/config:/config:rw
      - ${DOWNLOAD_DIR}:/downloads:rw
      - ./yt-dlp/cookies:/cookies:rw
      - ./yt-dlp/archive:/archive:rw
      - ./metube/config:/metube-cookies:ro
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "yt-dlp --update-to nightly 2>/dev/null || true; cp /metube-cookies/cookies.txt /tmp/metube-cookies.txt 2>/dev/null || true; while true; do sleep 3600; done"]
    command: []
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  yt-dlp-cli-vpn:
    image: ghcr.io/jim60105/yt-dlp:pot
    container_name: yt-dlp-cli-vpn
    profiles:
      - vpn
      - vpn-cli
    depends_on:
      openvpn-yt-dlp:
        condition: service_healthy
    network_mode: "service:openvpn-yt-dlp"
    user: "${PUID}:${PGID}"

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=Europe/Moscow
    volumes:
      - ./yt-dlp/config:/config:rw
      - ${DOWNLOAD_DIR}:/downloads:rw
      - ./yt-dlp/cookies:/cookies:rw
      - ./yt-dlp/archive:/archive:rw
      - ./metube/config:/metube-cookies:ro
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "yt-dlp --update-to nightly 2>/dev/null || true; cp /metube-cookies/cookies.txt /tmp/metube-cookies.txt 2>/dev/null || true; while true; do sleep 3600; done"]
    command: []
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  metube-direct:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube-direct
    profiles:
      - no-vpn
    ports:
      - "8088:8081/tcp"
    environment:
      - UID=${PUID}
      - GID=${PGID}
      - DOWNLOAD_DIR=/downloads
      - STATE_DIR=/config
      - DELETE_FILE_ON_TRASHCAN=false
      - DEFAULT_THEME=dark
      - OUTPUT_TEMPLATE=%(title)s.%(ext)s
      - YTDL_OPTIONS={"writesubtitles":true,"subtitleslangs":["en","es","fr"],"postprocessors":[{"key":"FFmpegEmbedSubtitle","already_have_subtitle":false}],"format":"bestvideo[height<=?1080]+bestaudio/best","http_headers":{"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"}}
    volumes:
      - ${DOWNLOAD_DIR}:/downloads
      - ./metube/config:/config
    restart: unless-stopped
    labels:
     - "com.centurylinklabs.watchtower.enable=true"

  landing-no-vpn:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: metube-landing
    profiles:
      - no-vpn
    ports:
      - "8086:8080/tcp"
    user: "${PUID}:${PGID}"

    environment:
      - METUBE_URL=http://metube-direct:8081
      - PROXY_PORT=8080
      - DASHBOARD_PORT=9090
      - DOWNLOAD_DIR=/downloads
    volumes:
      - ${DOWNLOAD_DIR}:/downloads:rw
    depends_on:
      metube-direct:
        condition: service_started
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: yt-dlp-dashboard
    profiles:
      - no-vpn
    ports:
      - "9090:8080/tcp"
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    depends_on:
      metube-direct:
        condition: service_started
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    profiles:
      - docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=false
      - WATCHTOWER_NO_STARTUP_CHECK=true
      - WATCHTOWER_SCHEDULE=0 0 */3 * * *
      - DOCKER_API_VERSION=1.44
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: unless-stopped
