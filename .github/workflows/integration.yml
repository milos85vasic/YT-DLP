name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration & Dashboard Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          # Create required directories
          mkdir -p /tmp/test-downloads
          mkdir -p yt-dlp/cookies
          mkdir -p yt-dlp/config
          mkdir -p yt-dlp/archive
          mkdir -p metube/config

          # Create minimal cookies file for cookie sync tests
          # Must contain YouTube domains so start script syncs it to metube
          {
            echo '# Netscape HTTP Cookie File'
            echo '# This file was generated by libcurl! Edit at your own risk.'
            echo $'.youtube.com\tTRUE\t/\tTRUE\t1735689600\tAPISID\tabc123def456'
            echo $'.youtube.com\tTRUE\t/\tTRUE\t1735689600\tHSID\tabc123def456'
            echo $'.youtube.com\tTRUE\t/\tTRUE\t1735689600\tSID\tabc123def456ghi789'
            echo $'.youtube.com\tTRUE\t/\tTRUE\t1735689600\tSSID\tabc123def456'
            echo $'.youtube.com\tTRUE\t/\tTRUE\t1735689600\tLOGIN_INFO\tabc123def456'
            echo $'.youtube.com\tTRUE\t/\tTRUE\t1735689600\tPREF\tabc123def456'
          } > yt-dlp/cookies/cookies.txt

          # Create .env from example with CI-specific settings
          cp .env.example .env
          sed -i 's|DOWNLOAD_DIR=/mnt/downloads|DOWNLOAD_DIR=/tmp/test-downloads|' .env
          sed -i 's/PUID=1000/PUID=1001/' .env
          sed -i 's/PGID=1000/PGID=1001/' .env
          sed -i 's/USE_VPN=false/USE_VPN=false/' .env

      - name: Initialize project
        run: ./init

      - name: Start services
        run: |
          export CONTAINER_RUNTIME=docker
          ./start
        timeout-minutes: 15

      - name: Wait for services to be ready
        run: |
          echo "Waiting for dashboard..."
          for i in {1..60}; do
            if curl -s --max-time 5 http://localhost:9090/ | grep -q '<title>YT-DLP Dashboard</title>'; then
              echo "Dashboard is ready"
              break
            fi
            echo "Waiting for dashboard... ($i/60)"
            sleep 2
          done

          echo "Waiting for landing page..."
          for i in {1..30}; do
            if curl -s --max-time 5 http://localhost:8086/ | grep -q '<title>'; then
              echo "Landing page is ready"
              break
            fi
            echo "Waiting for landing page... ($i/30)"
            sleep 2
          done

          echo "Waiting for MeTube direct..."
          for i in {1..30}; do
            if curl -s --max-time 5 http://localhost:8088/history | grep -q '"done"'; then
              echo "MeTube direct is ready"
              break
            fi
            echo "Waiting for MeTube direct... ($i/30)"
            sleep 2
          done

          echo "Container status:"
          docker ps

      - name: Run unit tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./tests/run-tests.sh -p unit

      - name: Run dashboard tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./tests/test-dashboard.sh
        timeout-minutes: 5

      - name: Run integration tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./tests/run-tests.sh -p integration -v
        timeout-minutes: 20
        continue-on-error: true

      - name: Run scenario tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./tests/run-tests.sh -p scenario -v
        timeout-minutes: 10
        continue-on-error: true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: tests/logs/
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          export CONTAINER_RUNTIME=docker
          ./stop || true

      - name: Cleanup
        if: always()
        run: |
          rm -f .env vpn-auth.txt
          docker system prune -f || true
