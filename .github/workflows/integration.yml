name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration & Dashboard Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify environment
        run: |
          echo "=== Tool versions ==="
          bash --version | head -1
          docker --version || true
          docker compose version || docker-compose version || true
          curl --version | head -1
          echo ""
          echo "=== User info ==="
          id
          echo ""
          echo "=== Working directory ==="
          pwd
          ls -la

      - name: Setup environment
        run: |
          set -x
          # Create required directories
          mkdir -p /tmp/test-downloads
          mkdir -p yt-dlp/cookies
          mkdir -p yt-dlp/config
          mkdir -p yt-dlp/archive
          mkdir -p metube/config

          # Create minimal cookies file for cookie sync tests
          # Must contain YouTube domains so metube detects them
          printf '%s\n' \
            '# Netscape HTTP Cookie File' \
            '# This file was generated by libcurl! Edit at your own risk.' \
            '.youtube.com	TRUE	/	TRUE	1735689600	APISID	abc123def456' \
            '.youtube.com	TRUE	/	TRUE	1735689600	HSID	abc123def456' \
            '.youtube.com	TRUE	/	TRUE	1735689600	SID	abc123def456ghi789' \
            '.youtube.com	TRUE	/	TRUE	1735689600	SSID	abc123def456' \
            '.youtube.com	TRUE	/	TRUE	1735689600	LOGIN_INFO	abc123def456' \
            '.youtube.com	TRUE	/	TRUE	1735689600	PREF	abc123def456' \
            > yt-dlp/cookies/cookies.txt

          # Sync cookies to metube config location
          cp -f yt-dlp/cookies/cookies.txt metube/config/cookies.txt
          chmod 644 metube/config/cookies.txt

          # Create .env with CI-specific settings
          cat > .env << 'EOF'
          USE_VPN=false
          DOWNLOAD_DIR=/tmp/test-downloads
          PUID=1001
          PGID=1001
          CONTAINER_RUNTIME=docker
          VPN_OVPN_PATH=/tmp/test-vpn/config.ovpn
          TZ=UTC
          EOF

          echo "=== .env contents ==="
          cat .env

      - name: Validate compose config
        run: |
          if docker compose config > /dev/null 2>&1; then
            echo "Docker Compose config is valid"
          elif docker-compose config > /dev/null 2>&1; then
            echo "Docker Compose config is valid (docker-compose)"
          else
            echo "ERROR: Docker Compose config validation failed"
            exit 1
          fi

      - name: Pull images
        run: |
          for image in ghcr.io/alexta69/metube:latest ghcr.io/jim60105/yt-dlp:pot; do
            echo "Pulling: $image"
            docker pull "$image" || echo "WARNING: Failed to pull $image, will use cached if available"
          done
        timeout-minutes: 10

      - name: Start containers
        run: |
          if docker compose --profile no-vpn up -d; then
            echo "Containers started"
          elif docker-compose --profile no-vpn up -d 2>/dev/null; then
            echo "Containers started (docker-compose)"
          else
            echo "ERROR: Failed to start containers"
            exit 1
          fi
        timeout-minutes: 5

      - name: Wait for services to be ready
        run: |
          set -x
          echo "Waiting for dashboard..."
          for i in {1..60}; do
            if curl -s --max-time 5 http://localhost:9090/ | grep -q '<title>YT-DLP Dashboard</title>'; then
              echo "Dashboard is ready"
              break
            fi
            echo "Waiting for dashboard... ($i/60)"
            sleep 2
          done

          echo "Waiting for landing page..."
          for i in {1..30}; do
            if curl -s --max-time 5 http://localhost:8086/ | grep -q '<title>'; then
              echo "Landing page is ready"
              break
            fi
            echo "Waiting for landing page... ($i/30)"
            sleep 2
          done

          echo "Waiting for MeTube direct..."
          for i in {1..30}; do
            if curl -s --max-time 5 http://localhost:8088/history | grep -q '"done"'; then
              echo "MeTube direct is ready"
              break
            fi
            echo "Waiting for MeTube direct... ($i/30)"
            sleep 2
          done

          echo "Container status:"
          docker ps

      - name: Run unit tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./tests/run-tests.sh -p unit

      - name: Run dashboard tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./tests/test-dashboard.sh
        timeout-minutes: 5

      - name: Run integration tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./tests/run-tests.sh -p integration -v
        timeout-minutes: 20
        continue-on-error: true

      - name: Run scenario tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./tests/run-tests.sh -p scenario -v
        timeout-minutes: 10
        continue-on-error: true

      - name: Run E2E smoke tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./scripts/smoke-test.sh
        timeout-minutes: 5

      - name: Run real HTTP integration tests
        run: |
          export CONTAINER_RUNTIME=docker
          ./tests/test-integration-realhttp.sh
        timeout-minutes: 5

      - name: Run test quality audit
        run: |
          ./scripts/test-audit.sh
        timeout-minutes: 2

      - name: Validate API contract
        run: |
          ./scripts/validate-contract.sh
        timeout-minutes: 2

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: tests/logs/
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          docker compose --profile no-vpn down || docker-compose --profile no-vpn down || true
          docker system prune -f || true
